<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mecafilter — Acceso</title>
<meta name="theme-color" content="#070710">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

:root{
  --green:#00ff88;
  --green2:#39ff14;
  --purple:#7b5cf7;
  --bg:#070710;
}

html,body{height:100%;background:var(--bg);font-family:'Space Grotesk',sans-serif;overflow:hidden;}

/* ── AURORA ── */
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:drift 12s ease-in-out infinite;}
.aurora-blob:nth-child(1){width:600px;height:600px;background:var(--green);top:-200px;left:-100px;animation-delay:0s;}
.aurora-blob:nth-child(2){width:500px;height:500px;background:var(--purple);bottom:-150px;right:-100px;animation-delay:-6s;}
.aurora-blob:nth-child(3){width:300px;height:300px;background:#00aaff;top:40%;left:40%;animation-delay:-3s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}}
.aurora::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");opacity:0.4;pointer-events:none;}

/* ── CARD ── */
.card{position:relative;z-index:1;width:min(420px,92vw);margin:0 auto;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;gap:0;}

/* ── LOCK ICON ── */
.lock-ring{
  position:relative;width:88px;height:88px;flex-shrink:0;
  animation:popIn 0.7s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
.lock-ring::before{
  content:'';position:absolute;inset:-6px;border-radius:50%;
  background:conic-gradient(var(--green) 0deg,var(--purple) 120deg,transparent 180deg,var(--green2) 300deg,var(--green) 360deg);
  animation:spin 4s linear infinite;
  mask:radial-gradient(farthest-side,transparent calc(100% - 2px),#000 calc(100% - 2px));
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 2px),#000 calc(100% - 2px));
}
@keyframes spin{to{transform:rotate(360deg)}}
.lock-inner{
  width:100%;height:100%;border-radius:50%;
  background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:2rem;position:relative;z-index:1;
}

/* ── BRAND ── */
.brand{margin-top:16px;text-align:center;opacity:0;animation:fadeUp 0.4s 0.5s ease both;}
.brand-name{font-family:'Orbitron',sans-serif;font-size:clamp(1.3rem,5.5vw,1.8rem);font-weight:900;letter-spacing:0.08em;color:#fff;}
.brand-name span{color:var(--green);}
.brand-tag{font-size:0.62rem;font-weight:300;letter-spacing:0.3em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:4px;}

/* ── PANEL ── */
.login-panel{
  margin-top:24px;width:100%;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;backdrop-filter:blur(20px);
  padding:24px;
  opacity:0;animation:fadeUp 0.4s 0.7s ease both;
}
.panel-label{font-size:0.58rem;letter-spacing:0.3em;color:rgba(255,255,255,0.22);text-transform:uppercase;margin-bottom:18px;font-weight:500;}

/* ── GOOGLE BUTTON ── */
.btn-google{
  width:100%;padding:14px 20px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);border-radius:12px;
  color:#fff;font-family:'Space Grotesk',sans-serif;
  font-size:0.88rem;font-weight:600;letter-spacing:0.02em;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:12px;
  transition:background 0.2s,border-color 0.2s,box-shadow 0.2s,transform 0.15s;
  position:relative;overflow:hidden;
}
.btn-google::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(0,255,136,0.08),rgba(123,92,247,0.08));
  opacity:0;transition:opacity 0.2s;
}
.btn-google:hover:not(:disabled){
  border-color:rgba(0,255,136,0.3);
  box-shadow:0 0 24px rgba(0,255,136,0.07);
  transform:translateY(-1px);
}
.btn-google:hover::before{opacity:1;}
.btn-google:active:not(:disabled){transform:translateY(0);}
.btn-google:disabled{opacity:0.45;cursor:not-allowed;transform:none;}
.google-svg{width:20px;height:20px;flex-shrink:0;}
.btn-label{position:relative;z-index:1;}

/* ── SPINNER ── */
.spinner{
  width:18px;height:18px;flex-shrink:0;
  border:2px solid rgba(0,255,136,0.15);
  border-top-color:var(--green);
  border-radius:50%;
  animation:spin 0.75s linear infinite;
}

/* ── ERROR ── */
.error-box{
  margin-top:14px;padding:10px 14px;
  background:rgba(255,82,82,0.07);
  border:1px solid rgba(255,82,82,0.22);border-radius:10px;
  font-size:0.74rem;line-height:1.55;color:#ff8a80;
  display:none;
}
.error-box.show{display:block;}

/* ── FOOTER ── */
.login-footer{
  margin-top:20px;
  font-size:0.6rem;letter-spacing:0.12em;color:rgba(255,255,255,0.15);
  text-align:center;text-transform:uppercase;
  opacity:0;animation:fadeUp 0.4s 0.9s ease both;
}

/* ── TRANSITIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card.page-out{animation:pageOut 0.55s ease forwards;}
@keyframes pageOut{to{opacity:0;transform:scale(0.97)}}
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div class="card" id="card">

  <div class="lock-ring">
    <div class="lock-inner">🔐</div>
  </div>

  <div class="brand">
    <div class="brand-name">MECA<span>FILTER</span></div>
    <div class="brand-tag">Calculadora de portes · Área privada</div>
  </div>

  <div class="login-panel">
    <div class="panel-label">Acceso al sistema</div>

    <button class="btn-google" id="btn-google">
      <svg class="google-svg" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span class="btn-label" id="btn-label">Continuar con Google</span>
    </button>

    <div class="error-box" id="error-box"></div>
  </div>

  <div class="login-footer">Solo usuarios autorizados · Mecafilter</div>

</div>

<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import { getAuth, signInWithPopup, onAuthStateChanged, GoogleAuthProvider, signOut }
                                 from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js';
import { getFirestore, doc, getDoc }
                                 from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyDuOUlvxhl7VHhua6HuxfMv_yf4kUqfCoo",
  authDomain:        "transporte-99482.firebaseapp.com",
  projectId:         "transporte-99482",
  storageBucket:     "transporte-99482.firebasestorage.app",
  messagingSenderId: "293811751597",
  appId:             "1:293811751597:web:5a7a9c7becf499897dd424"
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

// Si ya está autenticado y autorizado → ir directo al splash
onAuthStateChanged(auth, async user => {
  if (!user) return;
  const snap = await getDoc(doc(db, 'authorized_users', user.email));
  if (snap.exists()) goTo('splash.html');
});

// ── UI helpers ──
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.classList.add('show');
}

function setLoading(on) {
  const btn   = document.getElementById('btn-google');
  const label = document.getElementById('btn-label');
  btn.disabled = on;
  if (on) {
    btn.insertAdjacentHTML('afterbegin', '<div class="spinner"></div>');
    label.textContent = 'Verificando acceso…';
  } else {
    btn.querySelector('.spinner')?.remove();
    label.textContent = 'Continuar con Google';
  }
}

function goTo(url) {
  document.getElementById('card').classList.add('page-out');
  setTimeout(() => { window.location.href = url; }, 550);
}

// ── Login ──
document.getElementById('btn-google').addEventListener('click', async () => {
  document.getElementById('error-box').classList.remove('show');
  setLoading(true);
  try {
    const result = await signInWithPopup(auth, provider);
    const snap   = await getDoc(doc(db, 'authorized_users', result.user.email));
    if (snap.exists()) {
      goTo('splash.html');
    } else {
      await signOut(auth);
      setLoading(false);
      showError('⚠ Tu cuenta no tiene acceso. Contacta con el administrador.');
    }
  } catch (err) {
    setLoading(false);
    if (err.code !== 'auth/popup-closed-by-user') {
      showError('Error al iniciar sesión. Inténtalo de nuevo.');
    }
  }
});
</script>

</body>
</html>
