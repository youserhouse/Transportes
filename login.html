<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- ✅ SEGURIDAD: Content Security Policy — añadido 2026-06-16 -->
<meta http-equiv="Content-Security-Policy" content="
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://www.gstatic.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  font-src https://fonts.gstatic.com;
  connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://identitytoolkit.googleapis.com https://securetoken.googleapis.com https://firestore.googleapis.com;
  img-src 'self' data:;
  frame-src https://transporte-99482.firebaseapp.com;
">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculadora de Portes — Acceso</title>
<meta name="theme-color" content="#0D1018">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Transportes">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>
  (function () {
    var t = 'dark';
    try { t = localStorage.getItem('transportes_theme') || 'dark'; } catch (e) {}
    document.documentElement.className = t === 'light' ? 'theme-light' : 'theme-dark';
  })();
</script>
<style>
html,body{height:100%;overflow:hidden;}

/* ── AURORA ── */
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.16;animation:drift 12s ease-in-out infinite;}
.aurora-blob:nth-child(1){width:600px;height:600px;background:var(--accent);top:-200px;left:-100px;animation-delay:0s;}
.aurora-blob:nth-child(2){width:500px;height:500px;background:var(--pw);bottom:-150px;right:-100px;animation-delay:-6s;}
.aurora-blob:nth-child(3){width:300px;height:300px;background:var(--ceva);top:40%;left:40%;animation-delay:-3s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}}

/* ── CARD ── */
.login-card{position:relative;z-index:1;width:min(420px,92vw);margin:0 auto;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;gap:0;}

/* ── LOCK ICON ── */
.lock-ring{position:relative;width:72px;height:72px;flex-shrink:0;animation:popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;}
@keyframes popIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
.lock-inner{
  width:100%;height:100%;border-radius:4px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:1.7rem;color:var(--on-accent);
}

/* ── BRAND ── */
.brand{margin-top:18px;text-align:center;opacity:0;animation:fadeUp 0.4s 0.15s ease both;}
.brand-name{font-family:var(--sans);font-size:clamp(1.2rem,5vw,1.5rem);font-weight:700;letter-spacing:0;color:var(--text);}
.brand-tag{font-size:0.62rem;font-weight:500;font-family:var(--mono);letter-spacing:0.18em;color:var(--text3);text-transform:uppercase;margin-top:6px;}

/* ── PANEL ── */
.login-panel{
  margin-top:24px;width:100%;background:var(--surface);
  border:1px solid var(--border);border-radius:6px;
  padding:24px;box-shadow:var(--shadow);
  opacity:0;animation:fadeUp 0.4s 0.3s ease both;
}
.panel-label{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.18em;color:var(--text3);text-transform:uppercase;margin-bottom:18px;font-weight:600;}

/* ── GOOGLE BUTTON ── */
.btn-google{
  width:100%;padding:13px 18px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:4px;
  color:var(--text);font-family:var(--sans);font-size:0.86rem;font-weight:600;
  cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;
  transition:border-color 0.2s,box-shadow 0.2s,transform 0.15s;position:relative;overflow:hidden;
}
.btn-google:hover:not(:disabled){border-color:var(--accent);transform:translateY(-1px);}
.btn-google:active:not(:disabled){transform:translateY(0);}
.btn-google:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.google-svg{width:19px;height:19px;flex-shrink:0;}
.btn-label{position:relative;z-index:1;}

/* ── SPINNER ── */
.spinner{width:16px;height:16px;flex-shrink:0;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── DIVIDER ── */
.login-divider{display:flex;align-items:center;gap:10px;margin:18px 0 0;font-family:var(--mono);font-size:0.6rem;letter-spacing:0.18em;color:var(--text4);text-transform:uppercase;}
.login-divider::before,.login-divider::after{content:'';flex:1;height:1px;background:var(--border);}

/* ── EMAIL FORM ── */
.email-form{margin-top:14px;display:flex;flex-direction:column;gap:14px;}
.email-form .field{display:flex;flex-direction:column;gap:6px;}
.email-form .field-label{font-family:var(--mono);font-size:0.6rem;letter-spacing:0.1em;color:var(--text3);text-transform:uppercase;}
.email-form .field input{
  width:100%;padding:11px 14px;background:var(--in-bg);
  border:1px solid var(--in-border);border-radius:4px;
  color:var(--text);font-family:var(--sans);font-size:0.86rem;
  outline:none;transition:border-color 0.2s;
}
.email-form .field input:focus{border-color:var(--accent);}
.btn-email{
  width:100%;padding:13px 20px;margin-top:2px;background:var(--accent);
  border:1px solid var(--accent);border-radius:4px;
  color:var(--on-accent);font-family:var(--sans);font-size:0.86rem;font-weight:700;
  cursor:pointer;transition:opacity 0.2s,transform 0.15s;
}
.btn-email:hover:not(:disabled){opacity:0.88;transform:translateY(-1px);}
.btn-email:active:not(:disabled){transform:translateY(0);}
.btn-email:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* ── ERROR ── */
.login-error-box{
  margin-top:14px;padding:10px 14px;background:var(--danger-bg);
  border-left:3px solid var(--danger);border-radius:2px;
  font-family:var(--mono);font-size:0.72rem;line-height:1.55;color:var(--danger);display:none;
}
.login-error-box.show{display:block;}

/* ── FOOTER ── */
.login-page-footer{
  margin-top:22px;display:flex;align-items:center;gap:14px;
  opacity:0;animation:fadeUp 0.4s 0.45s ease both;
}
.login-page-footer .login-tag{
  font-family:var(--mono);font-size:0.6rem;letter-spacing:0.12em;color:var(--text4);text-transform:uppercase;
}
.login-page-footer .theme-toggle-btn{
  background:var(--step-off-bg);border:1px solid var(--border);border-radius:99px;padding:6px 14px;
  font-family:var(--mono);font-size:0.6rem;letter-spacing:0.06em;color:var(--text2);cursor:pointer;transition:all 0.15s;
}
.login-page-footer .theme-toggle-btn:hover{border-color:var(--accent);color:var(--accent);}

/* ── TRANSITIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.login-card.page-out{animation:pageOut 0.5s ease forwards;}
@keyframes pageOut{to{opacity:0;transform:scale(0.97)}}
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div class="login-card" id="card">

  <div class="lock-ring">
    <div class="lock-inner">🔐</div>
  </div>

  <div class="brand">
    <div class="brand-name">Calculadora de Portes</div>
    <div class="brand-tag">Palletways + CEVA · Área privada</div>
  </div>

  <div class="login-panel">
    <div class="panel-label">Acceso al sistema</div>

    <button class="btn-google" id="btn-google">
      <svg class="google-svg" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span class="btn-label" id="btn-label">Continuar con Google</span>
    </button>

    <div class="login-divider">o</div>

    <div class="email-form">
      <div class="field">
        <span class="field-label">Correo electrónico</span>
        <input type="email" id="inp-email" placeholder="usuario@empresa.com" autocomplete="email" inputmode="email">
      </div>
      <div class="field">
        <span class="field-label">Contraseña</span>
        <input type="password" id="inp-pass" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-email" id="btn-email">Iniciar sesión →</button>
    </div>

    <div class="login-error-box" id="error-box"></div>
  </div>

  <div class="login-page-footer">
    <span class="login-tag">Solo usuarios autorizados</span>
    <button type="button" class="theme-toggle-btn" data-theme-toggle onclick="toggleAppTheme()">☀ Claro</button>
  </div>

</div>

<script src="theme.js"></script>
<script type="module">
import { initializeApp }        from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import { getAuth, signInWithPopup, signInWithEmailAndPassword, onAuthStateChanged, GoogleAuthProvider, signOut }
                                 from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js';
import { getFirestore, doc, getDoc }
                                 from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:            "AIzaSyDuOUlvxhl7VHhua6HuxfMv_yf4kUqfCoo",
  authDomain:        "transporte-99482.firebaseapp.com",
  projectId:         "transporte-99482",
  storageBucket:     "transporte-99482.firebasestorage.app",
  messagingSenderId: "293811751597",
  appId:             "1:293811751597:web:5a7a9c7becf499897dd424"
};

const app      = initializeApp(firebaseConfig);
const auth     = getAuth(app);
const db       = getFirestore(app);
const provider = new GoogleAuthProvider();

// Si ya está autenticado y autorizado → ir directo al splash
onAuthStateChanged(auth, async user => {
  if (!user) return;
  const snap = await getDoc(doc(db, 'authorized_users', user.email));
  if (snap.exists()) goTo('splash.html');
});

// ── UI helpers ──
function showError(msg) {
  const el = document.getElementById('error-box');
  el.textContent = msg;
  el.classList.add('show');
}

function setLoading(on) {
  const btnG  = document.getElementById('btn-google');
  const btnE  = document.getElementById('btn-email');
  const label = document.getElementById('btn-label');
  btnG.disabled = on;
  btnE.disabled = on;
  if (on) {
    btnG.insertAdjacentHTML('afterbegin', '<div class="spinner"></div>');
    label.textContent = 'Verificando acceso…';
    btnE.textContent  = 'Verificando…';
  } else {
    btnG.querySelector('.spinner')?.remove();
    label.textContent = 'Continuar con Google';
    btnE.textContent  = 'Iniciar sesión →';
  }
}

function goTo(url) {
  document.getElementById('card').classList.add('page-out');
  setTimeout(() => { window.location.href = url; }, 550);
}

// ── Login Google ──
document.getElementById('btn-google').addEventListener('click', async () => {
  document.getElementById('error-box').classList.remove('show');
  setLoading(true);
  try {
    const result = await signInWithPopup(auth, provider);
    const snap   = await getDoc(doc(db, 'authorized_users', result.user.email));
    if (snap.exists()) {
      goTo('splash.html');
    } else {
      await signOut(auth);
      setLoading(false);
      showError('⚠ Tu cuenta no tiene acceso. Contacta con el administrador.');
    }
  } catch (err) {
    setLoading(false);
    if (err.code !== 'auth/popup-closed-by-user') {
      showError('Error al iniciar sesión. Inténtalo de nuevo.');
    }
  }
});

// ── Login con email/contraseña ──
document.getElementById('btn-email').addEventListener('click', async () => {
  const email = document.getElementById('inp-email').value.trim();
  const pass  = document.getElementById('inp-pass').value;
  document.getElementById('error-box').classList.remove('show');

  if (!email || !pass) {
    showError('Introduce correo y contraseña.');
    return;
  }

  setLoading(true);
  try {
    const result = await signInWithEmailAndPassword(auth, email, pass);
    const snap   = await getDoc(doc(db, 'authorized_users', result.user.email));
    if (snap.exists()) {
      goTo('splash.html');
    } else {
      await signOut(auth);
      setLoading(false);
      showError('⚠ Tu cuenta no tiene acceso. Contacta con el administrador.');
    }
  } catch (err) {
    setLoading(false);
    if (err.code === 'auth/invalid-credential' || err.code === 'auth/wrong-password' || err.code === 'auth/user-not-found') {
      showError('Correo o contraseña incorrectos.');
    } else {
      showError('Error al iniciar sesión. Inténtalo de nuevo.');
    }
  }
});

// Enviar con Enter desde los inputs
document.getElementById('inp-pass').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-email').click();
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('SW registrado:', reg.scope))
      .catch(err => console.warn('SW error:', err));
  });
}
</script>

</body>
</html>
