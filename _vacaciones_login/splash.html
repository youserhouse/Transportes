<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Vacaciones</title>
<meta name="theme-color" content="#070710">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--green:#00ff88;--green2:#39ff14;--purple:#7b5cf7;--bg:#070710;}
html,body{height:100%;background:var(--bg);font-family:'Space Grotesk',sans-serif;overflow:hidden;}

.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;}
.aurora-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:drift 12s ease-in-out infinite;}
.aurora-blob:nth-child(1){width:600px;height:600px;background:var(--green);top:-200px;left:-100px;animation-delay:0s;}
.aurora-blob:nth-child(2){width:500px;height:500px;background:var(--purple);bottom:-150px;right:-100px;animation-delay:-6s;}
.aurora-blob:nth-child(3){width:300px;height:300px;background:#00aaff;top:40%;left:40%;animation-delay:-3s;}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.95)}}

.splash{
  position:relative;z-index:1;
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:0;
  padding:32px;
}

.logo-ring{
  position:relative;width:110px;height:110px;
  animation:popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(0.4)}to{opacity:1;transform:scale(1)}}
.logo-ring::before{
  content:'';position:absolute;inset:-8px;border-radius:50%;
  background:conic-gradient(var(--green) 0deg,var(--purple) 120deg,transparent 180deg,var(--green2) 300deg,var(--green) 360deg);
  animation:spin 4s linear infinite;
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 calc(100% - 3px));
}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-inner{
  width:100%;height:100%;border-radius:50%;
  background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.15);
  display:flex;align-items:center;justify-content:center;
  font-size:2.6rem;
}

.brand{margin-top:20px;text-align:center;opacity:0;animation:fadeUp 0.5s 0.6s ease both;}
.brand-name{font-family:'Orbitron',sans-serif;font-size:clamp(1.3rem,5.5vw,2rem);font-weight:900;letter-spacing:0.06em;color:#fff;}
.brand-name span{color:var(--green);}
.brand-sub{font-size:0.65rem;letter-spacing:0.3em;color:rgba(255,255,255,0.3);text-transform:uppercase;margin-top:6px;}

.welcome{
  margin-top:32px;text-align:center;
  opacity:0;animation:fadeUp 0.5s 0.9s ease both;
}
.welcome-line{font-size:0.8rem;color:rgba(255,255,255,0.35);letter-spacing:0.05em;}
.welcome-name{
  margin-top:8px;
  font-size:clamp(1.1rem,4vw,1.4rem);font-weight:600;color:#fff;
}
.welcome-name em{color:var(--green);font-style:normal;}

.progress-bar{
  margin-top:36px;width:min(280px,70vw);
  opacity:0;animation:fadeUp 0.5s 1.1s ease both;
}
.progress-track{
  height:2px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;
}
.progress-fill{
  height:100%;width:0%;border-radius:2px;
  background:linear-gradient(90deg,var(--green),var(--purple));
  animation:fillBar 1.8s 1.3s ease forwards;
}
@keyframes fillBar{to{width:100%}}

.status{margin-top:10px;font-size:0.62rem;letter-spacing:0.15em;color:rgba(255,255,255,0.2);text-transform:uppercase;text-align:center;}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.splash.page-out{animation:pageOut 0.5s ease forwards;}
@keyframes pageOut{to{opacity:0;transform:scale(0.97)}}
</style>
</head>
<body>

<div class="aurora">
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
  <div class="aurora-blob"></div>
</div>

<div class="splash" id="splash">

  <div class="logo-ring">
    <div class="logo-inner">🏖️</div>
  </div>

  <div class="brand">
    <div class="brand-name">VACACIONES<span>·</span>PRO</div>
    <div class="brand-sub">Sistema de control de vacaciones</div>
  </div>

  <div class="welcome">
    <div class="welcome-line">Bienvenido de nuevo</div>
    <div class="welcome-name" id="welcome-name"><em>Cargando…</em></div>
  </div>

  <div class="progress-bar">
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
    <div class="status" id="status-txt">Iniciando sistema…</div>
  </div>

</div>

<script type="module">
import { initializeApp }   from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';
import { getAuth, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js';
import { getFirestore, doc, getDoc }   from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';

// ── REEMPLAZA CON TU CONFIG DE firebase.js ──
const firebaseConfig = {
  apiKey:            "PEGA_AQUI_TU_API_KEY",
  authDomain:        "PEGA_AQUI_TU_AUTH_DOMAIN",
  projectId:         "PEGA_AQUI_TU_PROJECT_ID",
  storageBucket:     "PEGA_AQUI_TU_STORAGE_BUCKET",
  messagingSenderId: "PEGA_AQUI_TU_SENDER_ID",
  appId:             "PEGA_AQUI_TU_APP_ID"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

function goTo(url) {
  document.getElementById('splash').classList.add('page-out');
  setTimeout(() => { window.location.href = url; }, 500);
}

onAuthStateChanged(auth, async user => {
  if (!user) { window.location.href = 'login.html'; return; }

  const snap = await getDoc(doc(db, 'authorized_users', user.email));
  if (!snap.exists()) { window.location.href = 'login.html'; return; }

  const nombre = user.displayName || user.email.split('@')[0];
  document.getElementById('welcome-name').innerHTML = `<em>${nombre}</em>`;
  document.getElementById('status-txt').textContent  = 'Acceso verificado · Cargando app…';

  setTimeout(() => goTo('index.html'), 3000);
});
</script>

</body>
</html>
