  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"4b1e876e-fee9-4715-8e32-9a71a3d0c3a8\"><\u002Fscript>\n\n<style>\n#auth-overlay{position:fixed;inset:0;z-index:999999;background:#0e0e0e;display:flex;align-items:center;justify-content:center;transition:opacity 0.4s ease;}\n#auth-overlay.fade-out{opacity:0;pointer-events:none;}\n.auth-spinner{width:32px;height:32px;border:3px solid rgba(41,121,255,0.15);border-top-color:#2979FF;border-radius:50%;animation:authSpin 0.8s linear infinite;}\n@keyframes authSpin{to{transform:rotate(360deg)}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div id=\"auth-overlay\"><div class=\"auth-spinner\"><\u002Fdiv><\u002Fdiv>\n<script type=\"module\">\nimport { initializeApp } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js';\nimport { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js';\nimport { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot } from 'https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js';\n\nconst firebaseConfig = {\n  apiKey:            \"AIzaSyDuOUlvxhl7VHhua6HuxfMv_yf4kUqfCoo\",\n  authDomain:        \"transporte-99482.firebaseapp.com\",\n  projectId:         \"transporte-99482\",\n  storageBucket:     \"transporte-99482.firebasestorage.app\",\n  messagingSenderId: \"293811751597\",\n  appId:             \"1:293811751597:web:5a7a9c7becf499897dd424\"\n};\n\nconst app  = initializeApp(firebaseConfig);\nconst auth = getAuth(app);\nconst db   = getFirestore(app);\n\nonAuthStateChanged(auth, async user => {\n  const overlay = document.getElementById('auth-overlay');\n  if (!user) {\n    window.location.replace('login.html');\n    return;\n  }\n  const snap = await getDoc(doc(db, 'authorized_users', user.email));\n  if (!snap.exists()) {\n    await signOut(auth);\n    window.location.replace('login.html');\n    return;\n  }\n  if (overlay) {\n    overlay.classList.add('fade-out');\n    setTimeout(() => overlay.remove(), 400);\n  }\n});\n\n// Suscripción en tiempo real a la colección compartida 'calculos'\n// (guardada manualmente desde la calculadora vía el botón \"Guardar\").\nwindow.fsSubscribeCalculos = function(callback) {\n  const q = query(collection(db, 'calculos'), orderBy('fecha', 'desc'));\n  return onSnapshot(q, snap => {\n    const rows = snap.docs.map(d => {\n      const data = d.data();\n      const fecha = data.fecha && typeof data.fecha.toDate === 'function' ? data.fecha.toDate() : new Date(data.fecha);\n      return { id: d.id, ...data, fecha };\n    });\n    callback(rows);\n  });\n};\n<\u002Fscript>\n<x-dc>\n<helmet>\n  <link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n  <style>/* cyrillic-ext */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 300;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"2184138d-72f0-4d22-9638-9bc08bbcdcf8\") format('woff2');\n  unicode-range: U+0460-052F, U+1C80-1C8A, U+20B4, U+2DE0-2DFF, U+A640-A69F, U+FE2E-FE2F;\n}\n/* cyrillic */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 300;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"3fb88754-2018-4c8f-b365-16a4860a79b4\") format('woff2');\n  unicode-range: U+0301, U+0400-045F, U+0490-0491, U+04B0-04B1, U+2116;\n}\n/* greek */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 300;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"4793e476-83d1-4223-aa81-bc677d438081\") format('woff2');\n  unicode-range: U+0370-0377, U+037A-037F, U+0384-038A, U+038C, U+038E-03A1, U+03A3-03FF;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 300;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"278f164e-e7c8-479f-baab-726e26f8ec38\") format('woff2');\n  unicode- VA<\u002Fbutton>\n    <\u002Fdiv>\n    <select class=\"msel\" value=\"{{ currentMonthValue }}\" onchange=\"{{ onMonthChange }}\">\n      <sc-for list=\"{{ monthOptions }}\" as=\"mo\" hint-placeholder-count=\"6\">\n        <option value=\"{{ mo.value }}\">{{ mo.label }}<\u002Foption>\n      <\u002Fsc-for>\n    <\u002Fselect>\n    <button class=\"ttheme\" onclick=\"{{ toggleTheme }}\">{{ themeIcon }}<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"main\">\n\n  <div class=\"kpi-row\">\n    <div class=\"card kpi-card\" style=\"--kc: var(--palletways)\">\n      <div class=\"kpi-icon\">📦<\u002Fdiv>\n      <div class=\"kpi-lbl\">Total portes<\u002Fdiv>\n      <div class=\"kpi-val\" style=\"color:var(--palletways)\">{{ kpiTotal }}<\u002Fdiv>\n      <div class=\"kpi-sub\">{{ kpiTotalSub }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card kpi-card\" style=\"--kc: var(--ceva)\">\n      <div class=\"kpi-icon\">💶<\u002Fdiv>\n      <div class=\"kpi-lbl\">Gasto total<\u002Fdiv>\n      <div class=\"kpi-val\" style=\"color:var(--ceva)\">{{ kpiGasto }}<\u002Fdiv>\n      <div class=\"kpi-sub\">euros acumulados<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card kpi-card\" style=\"--kc: var(--green)\">\n      <div class=\"kpi-icon\">🏆<\u002Fdiv>\n      <div class=\"kpi-lbl\">Más usado<\u002Fdiv>\n      <div class=\"kpi-val sm\" style=\"color:var(--green)\">{{ kpiTrans }}<\u002Fdiv>\n      <div class=\"kpi-sub\">{{ kpiTransSub }}<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card kpi-card\" style=\"--kc: var(--green)\">\n      <div class=\"kpi-icon\">✂️<\u002Fdiv>\n      <div class=\"kpi-lbl\">Ahorro total<\u002Fdiv>\n      <div class=\"kpi-val\" style=\"color:var(--green)\">{{ kpiAhorro }}<\u002Fdiv>\n      <div class=\"kpi-sub\">eligiendo el más barato<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <p class=\"sec-title\">Comparativa de transportistas<\u002Fp>\n  <div class=\"comp-row\">\n    <div class=\"card comp-card\">\n      <div class=\"comp-hd\">\n        <div cla \u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"chart-sm\"><canvas id=\"chartCeva\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"card full-card\">\n    <p class=\"sec-title\">Evolución del gasto<\u002Fp>\n    <div class=\"chart-lg\"><canvas id=\"chartLinea\"><\u002Fcanvas><\u002Fdiv>\n  <\u002Fdiv>\n\n  <p class=\"sec-title\">Análisis de palets enviados por transportista<\u002Fp>\n  <div class=\"weight-row\">\n    <div class=\"card weight-card\">\n      <div class=\"w-carrier\" style=\"color:var(--palletways)\">Palletways<\u002Fdiv>\n      <div class=\"w-num\" style=\"color:var(--palletways)\">{{ avgPalesPall }}<span class=\"w-unit\">pal<\u002Fspan><\u002Fdiv>\n      <div class=\"w-sublbl\">palés medios por envío<\u002Fdiv>\n      <div class=\"w-bar-bg\"><div style=\"{{ pallBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"w-cats\">\n        <div class=\"w-cat\">\n          <div class=\"w-cat-dot\" style=\"background:var(--palletways)\"><\u002Fdiv>\n          <span>1 palé<\u002Fspan>\n          <span class=\"w-cat-val\" style=\"color:var(--palletways)\">{{ pallPales1Pct }}%<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"w-cat\">\n          <div class=\"w-cat-dot\" style=\"background:var(--text-muted)\"><\u002Fdiv>\n          <span>2–3 palés<\u002Fspan>\n          <span class=\"w-cat-val\">{{ pallPales23Pct }}%<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"w-cat\">\n          <div class=\"w-cat-dot\" style=\"background:var(--ceva)\"><\u002Fdiv>\n          <span>4+ palés<\u002Fspan>\n          <span class=\"w-cat-val\" style=\"color:var(--ceva)\">{{ pallPales4Pct }}%<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card weight-card\">\n      <div class=\"w-carrier\" style=\"color:var(--ceva)\">CEVA<\u002Fdiv>\n      <div class=\"w-num\" style=\"color:var(--ceva)\">{{ avgPalesCeva }}<span class=\"w-unit\">pal<\u002Fspan><\u002Fdiv>\n      <div class=\"w-sublbl\">palés medios por envío<\u002Fdiv>\n      <div class=\"w-bar-bg\"><div style=\"{{ cevaBarStyle }}\"><\u002Fdiv><\u002Fdiv>\n      <div class=\"w-cats\">\n        <div class=\"w-cat\">\n          <div class=\"w-cat-dot\" style=\"background:var(--palletways)\"><\u002Fdiv>\n          <span>1 palé<\u002Fspan>\n          <span class=\"w-cat-val\" style=\"color:var(--palletways)\">{{ cevaPales1Pct }}%<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"w-cat\">\n          <div class=\"w-cat-dot\" style=\"background:var(--text-muted)\"><\u002Fdiv>\n          <span>2–3 palés<\u002Fspan>\n          <span class=\"w-cat-val\">{{ cevaPales23Pct }}%<\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"w-cat\">\n          <div class=\"w-cat-dot\" style=\"background:var(--ceva)\"><\u002Fdiv>\n          <span>4+ palés<\u002Fspan>\n          <span class=\"w-cat-val\" style=\"color:var(--ceva)\">{{ cevaPales4Pct }}%<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card weight-card\">\n      <div class=\"w-carrier\" style=\"color:var(--text-muted)\">Distribución por rango de palets<\u002Fdiv>\n      <div class=\"w-chart-wrap\"><canvas id=\"chartPeso\"><\u002Fcanvas><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"bottom-row\">\n    <div class=\"card full-card\" style=\"margin-bottom:0\">\n      <p class=\"sec-title\">Por provincia<\u002Fp>\n      <div class=\"donut-wrap\"><canvas id=\"chartDonut\"><\u002Fcanvas><\u002Fdiv>\n      <div class=\"leg\">\n        <sc-for list=\"{{ donutLegend }}\" as=\"dl\" hint-placeholder-count=\"5\">\n          <div class=\"leg-item\">\n            <div class=\"leg-dot\" style=\"{{ dl.dotStyle }}\"><\u002Fdiv>\n            <span>{{ dl.name }}<\u002Fspan>\n            <span class=\"leg-val\">{{ dl.val }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card tcard\">\n      <div class=\"tcard-hd\">\n        <h3>Historial de cálculos<\u002Fh3>\n        <button class=\"exp-btn\" onclick=\"{{ exportCSV }}\">⬇ Exportar CSV<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"twrap\">\n        <table>\n          <thead>\n            <tr>\n              <th>Fecha<\u002Fth><th>Tipo<\u002Fth><th>Destino<\u002Fth><th>Provincia<\u002Fth>\n              <th>Palés<\u002Fth><th>Peso kg<\u002Fth><th>Palletways €<\u002Fth>\n              <th>CEVA €<\u002Fth><th>Elegido<\u002Fth><th>Ahorro<\u002Fth><th>Guardado por<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody id=\"dc-tbody\"><\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n      <div class=\"pag\">\n        <span>{{ pagInfo }}<\u002Fspan>\n        <div class=\"pag-ctrl\">\n          <sc-for list=\"{{ pagButtons }}\" as=\"btn\" hint-placeholder-count=\"5\">\n            <button class=\"{{ btn.cls }}\" disabled=\"{{ btn.disabled }}\" onclick=\"{{ btn.onClick }}\">{{ btn.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    filter: 'mes',\n    month: new Date().getMonth(),\n    year: new Date().getFullYear(),\n    carrier: 'ambos',\n    page: 1,\n    isDark: (() => { try { return (localStorage.getItem('transportes_theme') || 'dark') !== 'light'; } catch (e) { return true; } })(),\n    calculos: [],\n  };\n\n  PAGE_SIZE = 10;\n  _charts = {};\n  _unsubCalculos = null;\n\n  // Lee los cálculos guardados manualmente desde la calculadora (Firestore: colección 'calculos').\n  // El transportista mostrado en \"elegido\" es el elegido a mano, no necesariamente el más barato.\n  get _data() {\n    const rows = this.state.calculos || [];\n    return rows.map(it => ({\n      fecha: it.fecha instanceof Date ? it.fecha : new Date(it.fecha),\n      tipo: it.tipo || 'PALÉS',\n      destino: it.destino || 'ESPAÑA',\n      provincia: it.provincia || '',\n      cp: it.cp || '',\n      zona: it.zona ?? '—',\n      pales: Number(it.pales) || 0,\n      altura: Number(it.altura) || 0,\n      peso: it.peso != null ? Number(it.peso) : null,\n      precioPall: Number(it.precioPall) || 0,\n      precioCeva: Number(it.precioCeva) || 0,\n      elegido: it.elegido === 'PALLETWAYS' ? 'PALLETWAYS' : 'CEVA',\n      ahorro: Number(it.ahorro) || 0,\n      savedBy: it.savedBy || '',\n    })).sort((a, b) => b.fecha - a.fecha);\n  }\n\n  _getPeriodData() {\n    const { filter, month, year } = this.state;\n    const now = new Date();\n    let start, end;\n    if (filter === 'hoy') {\n      start = new Date(now.getFullYear(), now.getMonth(), now.getDate());\n      end = new Date(start); end.setDate(end.getDate() + 1);\n    } else if (filter === 'semana') {\n      const day = now.getDay() || 7;\n      start = new Date(now); start.setDate(now.getDate() - day + 1); start.setHours(0,0,0,0);\n      end = new Date(start); end.setDate(end.getDate() + 7);\n    } else {\n      start = new Date(year, month, 1);\n      end = new Date(year, month + 1, 0, 23, 59, 59);\n    }\n    return this._data.filter(r => r.fecha >= start && r.fecha <= end);\n  }\n\n  _getFilteredData() {\n    const { carrier } = this.state;\n    let data = this._getPeriodData();\n    if (carrier === 'palletways') data = data.filter(r => r.elegido === 'PALLETWAYS');\n    else if (carrier === 'ceva') data = data.filter(r => r.elegido === 'CEVA');\n    return data;\n  }\n\n  _getTimeSeries(data) {\n    const { filter, month, year } = this.state;\n    const now = new Date();\n    const labels = [], pallVals = [], cevaVals = [];\n    if (filter === 'hoy') {\n      for (let h = 8; h <= 18; h++) {\n        labels.push(h + 'h');\n        const inH = data.filter(r => r.fecha.getHours() === h);\n        pallVals.push(inH.filter(r => r.elegido === 'PALLETWAYS').reduce((s,r) => s + r.precioPall, 0));\n        cevaVals.push(inH.filter(r => r.elegido === 'CEVA').reduce((s,r) => s + r.precioCeva, 0));\n      }\n    } else if (filter === 'semana') {\n      const dias = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];\n      const day = now.getDay() || 7;\n      const mon = new Date(now); mon.setDate(now.getDate() - day + 1); mon.setHours(0,0,0,0);\n      for (let i = 0; i < 7; i++) {\n        const d = new Date(mon); d.setDate(mon.getDate() + i);\n        labels.push(dias[i]);\n        const inD = data.filter(r => r.fecha.getDate() === d.getDate() && r.fecha.getMonth() === d.getMonth());\n        pallVals.push(inD.filter(r => r.elegido === 'PALLETWAYS').reduce((s,r) => s + r.precioPall, 0));\n        cevaVals.push(inD.filter(r => r.elegido === 'CEVA').reduce((s,r) => s + r.precioCeva, 0));\n      }\n    } else {\n      const dim = new Date(year, month + 1, 0).getDate();\n      for (let d = 1; d <= dim; d++) {\n        labels.push(d);\n        const inD = data.filter(r => r.fecha.getDate() === d && r.fecha.getMonth() === month);\n        pallVals.push(inD.filter(r => r.elegido === 'PALLETWAYS').reduce((s,r) => s + r.precioPall, 0));\n        cevaVals.push(inD.filter(r => r.elegido === 'CEVA').reduce((s,r) => s + r.precioCeva, 0));\n      }\n    }\n    return { labels, pallVals, cevaVals };\n  }\n\n  _gc(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }\n\n  _renderTableDom() {\n    const tbody = document.getElementById('dc-tbody');\n    if (!tbody) return;\n    const { page } = this.state;\n    const data = this._getFilteredData();\n    const start = (page - 1) * this.PAGE_SIZE;\n    const rows = data.slice(start, start + this.PAGE_SIZE);\n    const esc = s => String(s).replace(/&/g,'&amp;').replace(/<\u002Fg,'&lt;').replace(/>/g,'&gt;');\n    tbody.innerHTML = rows.map(r => {\n      const bg = r.elegido==='PALLETWAYS' ? 'rgba(74,147,219,0.04)' : 'rgba(232,120,48,0.04)';\n      const dCls = r.destino==='ESPAÑA' ? 'badge-g' : 'badge-c';\n      const eCls = r.elegido==='PALLETWAYS' ? 'badge-p' : 'badge-c';\n      return `<tr style=\"background:${bg}\">\n        <td>${esc(this._fmtFecha(r.fecha))}<\u002Ftd>\n        <td><span class=\"badge badge-m\">${esc(r.tipo)}<\u002Fspan><\u002Ftd>\n        <td><span class=\"badge ${dCls}\">${esc(r.destino)}<\u002Fspan><\u002Ftd>\n        <td>${esc(r.provincia)}<\u002Ftd>\n        <td style=\"text-align:center\">${r.pales}<\u002Ftd>\n        <td>${r.peso ?? '—'}<\u002Ftd>\n        <td style=\"color:var(--palletways);font-weight:500\">${r.precioPall.toFixed(2)}€<\u002Ftd>\n        <td style=\"color:var(--ceva);font-weight:500\">${r.precioCeva.toFixed(2)}€<\u002Ftd>\n        <td><span class=\"badge ${eCls}\">${esc(r.elegido)}<\u002Fspan><\u002Ftd>\n        <td class=\"saving\">+${r.ahorro.toFixed(2)}€<\u002Ftd>\n        <td style=\"color:var(--text-muted);font-size:11px\">${esc(r.savedBy || '—')}<\u002Ftd>\n      <\u002Ftr>`;\n    }).join('');\n  }\n\n  _fmtFecha(d) {\n    return d.toLocaleDateString('es-ES', { day:'2-digit', month:'2-digit', year:'numeric' }) +\n      ' ' + d.toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit' });\n  }\n\n  _drawCharts() {\n    if (!window.Chart) { setTimeout(() => this._drawCharts(), 150); return; }\n    const gc = v => this._gc(v);\n    const periodData = this._getPeriodData();\n    const filteredData = this._getFilteredData();\n    const tsPeriod = this._getTimeSeries(periodData);\n    const tsFiltered = this._getTimeSeries(filteredData);\n\n    Object.values(this._charts).forEach(c => c && c.destroy());\n    this._charts = {};\n\n    // Factory — Chart.js 4 mutates the options object, so each chart needs its own copy\n    const mkBarScales = () => ({\n      x: { ticks: { color: gc('--text-muted'), font: { size: 9, family: 'IBM Plex Sans' } }, grid: { color: gc('--border') } },\n      y: { ticks: { color: gc('--text-muted'), font: { size: 9, family: 'IBM Plex Sans' }, callback: v => v+'€' }, grid: { color: gc('--border') } }\n    });\n\n    try {\n      const pallCanvas = document.getElementById('chartPall');\n      if (pallCanvas) this._charts.pall = new Chart(pallCanvas.getContext('2d'), {\n        type: 'bar',\n        data: { labels: tsPeriod.labels, datasets: [{ data: tsPeriod.pallVals, backgroundColor: gc('--palletways')+'2a', borderColor: gc('--palletways'), borderWidth: 1.5, borderRadius: 4 }] },\n        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(2)+'€'}} }, scales: mkBarScales() }\n      });\n\n      const cevaCanvas = document.getElementById('chartCeva');\n      if (cevaCanvas) this._charts.ceva = new Chart(cevaCanvas.getContext('2d'), {\n        type: 'bar',\n        data: { labels: tsPeriod.labels, datasets: [{ data: tsPeriod.cevaVals, backgroundColor: gc('--ceva')+'2a', borderColor: gc('--ceva'), borderWidth: 1.5, borderRadius: 4 }] },\n        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>c.parsed.y.toFixed(2)+'€'}} }, scales: mkBarScales() }\n      });\n    } catch(e) { /* canvas not yet ready, will redraw on next update */ }\n\n    const lineCanvas = document.getElementById('chartLinea');\n    if (lineCanvas) this._charts.linea = new Chart(lineCanvas.getContext('2d'), {\n      type: 'line',\n      data: {\n        labels: tsFiltered.labels,\n        datasets: [\n          { label:'Palletways', data:tsFiltered.pallVals, borderColor:gc('--palletways'), backgroundColor:gc('--palletways')+'18', fill:true, tension:0.35, pointRadius:3, pointBackgroundColor:gc('--palletways') },\n          { label:'CEVA', data:tsFiltered.cevaVals, borderColor:gc('--ceva'), backgroundColor:gc('--ceva')+'18', fill:true, tension:0.35, pointRadius:3, pointBackgroundColor:gc('--ceva') }\n        ]\n      },\n      options: {\n        responsive:true, maintainAspectRatio:false,\n        plugins:{\n          legend:{ labels:{ color:gc('--text'), font:{ size:12, family:'IBM Plex Sans' }, boxWidth:12, padding:16 } },\n          tooltip:{ callbacks:{ label:c=>c.dataset.label+': '+c.parsed.y.toFixed(2)+'€' } }\n        },\n        scales:{\n          x:{ ticks:{ color:gc('--text-muted') }, grid:{ color:gc('--border') } },\n          y:{ ticks:{ color:gc('--text-muted'), callback:v=>v+'€' }, grid:{ color:gc('--border') } }\n        }\n      }\n    });\n\n    const donutCanvas = document.getElementById('chartDonut');\n    if (donutCanvas) {\n      const provCountsChart = {};\n      periodData.forEach(r => { provCountsChart[r.provincia] = (provCountsChart[r.provincia]||0)+1; });\n      const topProvsChart = Object.entries(provCountsChart).sort((a,b)=>b[1]-a[1]).slice(0,6);\n      const donutColors = [gc('--palletways'), gc('--ceva'), gc('--green'), '#a855f7', '#ec4899', '#f59e0b'];\n      this._charts.donut = new Chart(donutCanvas.getContext('2d'), {\n        type: 'doughnut',\n        data: {\n          labels: topProvsChart.map(([n]) => n),\n          datasets: [{ data: topProvsChart.map(([,c]) => c), backgroundColor: donutColors, borderColor: gc('--bg-card'), borderWidth: 3, hoverOffset: 6 }]\n        },\n        options: { responsive:true, maintainAspectRatio:false, cutout:'68%', plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed} envíos`}} } }\n      });\n    }\n\n    const pesoCanvas = document.getElementById('chartPeso');\n    if (pesoCanvas) {\n      const pall = periodData.filter(r => r.elegido === 'PALLETWAYS');\n      const ceva = periodData.filter(r => r.elegido === 'CEVA');\n      const pCatsArr = (arr) => [\n        arr.filter(r => r.pales === 1).length,\n        arr.filter(r => r.pales >= 2 && r.pales <= 3).length,\n        arr.filter(r => r.pales >= 4).length\n      ];\n      this._charts.peso = new Chart(pesoCanvas.getContext('2d'), {\n        type: 'bar',\n        data: {\n          labels: ['1 palé','2–3 palés','4+ palés'],\n          datasets: [\n            { label:'Palletways', data:pCatsArr(pall), backgroundColor:gc('--palletways')+'99', borderColor:gc('--palletways'), borderWidth:1.5, borderRadius:4 },\n            { label:'CEVA', data:pCatsArr(ceva), backgroundColor:gc('--ceva')+'99', borderColor:gc('--ceva'), borderWidth:1.5, borderRadius:4 }\n          ]\n        },\n        options: {\n          responsive:true, maintainAspectRatio:false,\n          plugins:{\n            legend:{ labels:{ color:gc('--text'), font:{ size:11, family:'IBM Plex Sans' }, boxWidth:12, padding:14 } },\n            tooltip:{ callbacks:{ label:c=>c.dataset.label+': '+c.parsed.y+' envíos' } }\n          },\n          scales:{\n            x:{ ticks:{ color:gc('--text-muted'), font:{ size:10 } }, grid:{ color:gc('--border') } },\n            y:{ ticks:{ color:gc('--text-muted'), precision:0 }, grid:{ color:gc('--border') } }\n          }\n        }\n      });\n    }\n  }\n\n  componentDidMount() {\n    document.documentElement.setAttribute('data-theme', this.state.isDark ? 'dark' : 'light');\n    this._drawTimeout = setTimeout(() => { this._drawCharts(); this._renderTableDom(); }, 80);\n    if (window.fsSubscribeCalculos) {\n      this._unsubCalculos = window.fsSubscribeCalculos(rows => {\n        this.setState({ calculos: rows });\n        clearTimeout(this._drawTimeout);\n        this._drawTimeout = setTimeout(() => this._drawCharts(), 50);\n      });\n    }\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this._drawTimeout);\n    Object.values(this._charts).forEach(c => c && c.destroy());\n    this._charts = {};\n    if (this._unsubCalculos) this._unsubCalculos();\n  }\n\n  componentDidUpdate(prevProps) {\n    const { filter, month, year, carrier, isDark } = this.state;\n    this._renderTableDom();\n    const prev = this._prevRenderState || {};\n    if (filter !== prev.filter || month !== prev.month || year !== prev.year || carrier !== prev.carrier || isDark !== prev.isDark) {\n      document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');\n      clearTimeout(this._drawTimeout);\n      this._drawTimeout = setTimeout(() => this._drawCharts(), 40);\n    }\n    this._prevRenderState = { filter, month, year, carrier, isDark };\n  }\n\n  renderVals() {\n    const { filter, month, year, carrier, page, isDark } = this.state;\n    const periodData = this._getPeriodData();\n    const filteredData = this._getFilteredData();\n\n    const pallAll = periodData.filter(r => r.elegido === 'PALLETWAYS');\n    const cevaAll = periodData.filter(r => r.elegido === 'CEVA');\n    const total = filteredData.length;\n    const gasto = filteredData.reduce((s,r) => s + (r.elegido==='PALLETWAYS' ? r.precioPall : r.precioCeva), 0);\n    const ahorro = filteredData.reduce((s,r) => s + r.ahorro, 0);\n    const masUsado = pallAll.length >= cevaAll.length ? 'PALLETWAYS' : 'CEVA';\n    const gastoPall = pallAll.reduce((s,r) => s + r.precioPall, 0);\n    const gastoCeva = cevaAll.reduce((s,r) => s + r.precioCeva, 0);\n\n    // Pallets avg\n    const avgPalesNumPall = pallAll.length ? parseFloat((pallAll.reduce((s,r)=>s+r.pales,0)/pallAll.length).toFixed(1)) : 0;\n    const avgPalesNumCeva = cevaAll.length ? parseFloat((cevaAll.reduce((s,r)=>s+r.pales,0)/cevaAll.length).toFixed(1)) : 0;\n    const maxAvgPales = Math.max(avgPalesNumPall, avgPalesNumCeva) || 1;\n    const pCats = arr => {\n      const n = arr.length || 1;\n      return {\n        one:  Math.round(arr.filter(r=>r.pales===1).length/n*100),\n        two3: Math.round(arr.filter(r=>r.pales>=2&&r.pales<=3).length/n*100),\n        four: Math.round(arr.filter(r=>r.pales>=4).length/n*100)\n      };\n    };\n    const pallPalesCats = pCats(pallAll);\n    const cevaPalesCats = pCats(cevaAll);\n\n    // Month options\n    const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];\n    const now = new Date();\n    const monthOptions = [];\n    for (let i = 0; i < 6; i++) {\n      const d = new Date(now.getFullYear(), now.getMonth()-i, 1);\n      monthOptions.push({ value: `${d.getFullYear()}-${d.getMonth()}`, label: `${monthNames[d.getMonth()]} ${d.getFullYear()}` });\n    }\n\n    // Table\n    const start = (page-1)*this.PAGE_SIZE;\n    const pageData = filteredData.slice(start, start+this.PAGE_SIZE);\n    const pages = Math.ceil(total/this.PAGE_SIZE)||1;\n\n    const pagButtons = [];\n    pagButtons.push({ label:'‹', cls:'pg-btn', disabled:page===1, onClick:page>1?()=>this.setState({page:page-1}):undefined });\n    for (let i=1; i<=pages; i++) {\n      const p=i;\n      pagButtons.push({ label:String(i), cls:'pg-btn'+(i===page?' active':''), disabled:false, onClick:()=>this.setState({page:p}) });\n    }\n    pagButtons.push({ label:'›', cls:'pg-btn', disabled:page===pages, onClick:page<pages?()=>this.setState({page:page+1}):undefined });\n\n\n\n    // Province donut legend\n    const provCountsAll = {};\n    periodData.forEach(r => { provCountsAll[r.provincia] = (provCountsAll[r.provincia]||0)+1; });\n    const topProvsDl = Object.entries(provCountsAll).sort((a,b)=>b[1]-a[1]).slice(0,6);\n    const provTotalDl = periodData.length || 1;\n    const donutColorsCss = ['var(--palletways)','var(--ceva)','var(--green)','#a855f7','#ec4899','#f59e0b'];\n    const donutLegend = topProvsDl.map(([name, count], i) => ({\n      dotStyle: { background: donutColorsCss[i % donutColorsCss.length] },\n      name,\n      val: `${count} (${Math.round(count/provTotalDl*100)}%)`\n    }));\n\n    return {\n      themeIcon: isDark ? '🌙' : '☀️',\n      toggleTheme: () => {\n        const next = !this.state.isDark;\n        document.documentElement.setAttribute('data-theme', next ? 'dark' : 'light');\n        try { localStorage.setItem('transportes_theme', next ? 'dark' : 'light'); } catch (e) {}\n        this.setState({ isDark: next });\n        clearTimeout(this._drawTimeout);\n        this._drawTimeout = setTimeout(() => this._drawCharts(), 80);\n      },\n\n      setFilterHoy:    () => this.setState({ filter:'hoy',     page:1 }),\n      setFilterSemana: () => this.setState({ filter:'semana',  page:1 }),\n      setFilterMes:    () => this.setState({ filter:'mes',     page:1 }),\n      btnHoyClass:    'fbtn'+(filter==='hoy'    ?' active':''),\n      btnSemanaClass: 'fbtn'+(filter==='semana' ?' active':''),\n      btnMesClass:    'fbtn'+(filter==='mes'    ?' active':''),\n\n      setCarrierAmbos: () => this.setState({ carrier:'ambos',      page:1 }),\n      setCarrierPall:  () => this.setState({ carrier:'palletways', page:1 }),\n      setCarrierCeva:  () => this.setState({ carrier:'ceva',       page:1 }),\n      btnAmbosClass: 'fbtn'+(carrier==='ambos'      ?' active':''),\n      btnPallClass:  'fbtn'+(carrier==='palletways' ?' active':''),\n      btnCevaClass:  'fbtn'+(carrier==='ceva'       ?' active':''),\n\n      currentMonthValue: `${year}-${month}`,\n      monthOptions,\n      onMonthChange: e => { const [y,m]=e.target.value.split('-'); this.setState({ year:parseInt(y), month:parseInt(m), page:1 }); },\n\n      kpiTotal: total,\n      kpiTotalSub: `${total} envío${total!==1?'s':''} en el período`,\n      kpiGasto: gasto.toFixed(2)+'€',\n      kpiTrans: masUsado,\n      kpiTransSub: `${pallAll.length} Pall. · ${cevaAll.length} CEVA`,\n      kpiAhorro: ahorro.toFixed(2)+'€',\n\n      compPallPct:    Math.round(pallAll.length/(periodData.length||1)*100)+'%',\n      compCevaPct:    Math.round(cevaAll.length/(periodData.length||1)*100)+'%',\n      statPallEnvios: pallAll.length,\n      statPallGasto:  gastoPall.toFixed(2)+'€',\n      statPallTicket: pallAll.length ? (gastoPall/pallAll.length).toFixed(2)+'€' : '—',\n      statCevaEnvios: cevaAll.length,\n      statCevaGasto:  gastoCeva.toFixed(2)+'€',\n      statCevaTicket: cevaAll.length ? (gastoCeva/cevaAll.length).toFixed(2)+'€' : '—',\n\n      avgPalesPall: avgPalesNumPall.toFixed(1),\n      avgPalesCeva: avgPalesNumCeva.toFixed(1),\n      pallBarStyle: { width:Math.round(avgPalesNumPall/maxAvgPales*100)+'%', background:'var(--palletways)', height:'100%', borderRadius:'3px', transition:'width 0.55s ease' },\n      cevaBarStyle: { width:Math.round(avgPalesNumCeva/maxAvgPales*100)+'%', background:'var(--ceva)',       height:'100%', borderRadius:'3px', transition:'width 0.55s ease' },\n      pallPales1Pct: pallPalesCats.one, pallPales23Pct: pallPalesCats.two3, pallPales4Pct: pallPalesCats.four,\n      cevaPales1Pct: cevaPalesCats.one, cevaPales23Pct: cevaPalesCats.two3, cevaPales4Pct: cevaPalesCats.four,\n\n      donutLegend,\n\n      pagInfo: `${Math.min(start+1,total)}–${Math.min(start+this.PAGE_SIZE,total)} de ${total} registros`, pagButtons,\n\n      exportCSV: () => {\n        const hdrs = ['Fecha','Tipo','Destino','Provincia','CP','Palés','Altura','Peso','Zona','Precio Palletways','Precio CEVA','Elegido','Ahorro','Guardado por'];\n        const rows = filteredData.map(r => [this._fmtFecha(r.fecha),r.tipo,r.destino,r.provincia,r.cp,r.pales,r.altura,r.peso ?? '',r.zona,r.precioPall.toFixed(2),r.precioCeva.toFixed(2),r.elegido,r.ahorro.toFixed(2),r.savedBy || '']);\n        const csv = [hdrs,...rows].map(r=>r.join(';')).join('\\n');\n        const a = document.createElement('a');\n        a.href = URL.createObjectURL(new Blob(['\\ufeff'+csv],{type:'text/csv;charset=utf-8'}));\n        a.download = `portes_${new Date().toISOString().slice(0,10)}.csv`;\n        a.click();\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"</script>
